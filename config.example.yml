cameras:
  cam_65:
    rtsp: rtsp://user:password@192.168.1.65/stream2
    rtsp_hd: rtsp://user:password@192.168.1.65/stream1
    rotation: 90
    fps_process: 5
    min_face_w: 60        # ignore faces narrower than this (distant/blurry)
    max_pitch: 35
  cam_64:
    rtsp: rtsp://user:password@192.168.1.64/stream2
    rtsp_hd: rtsp://user:password@192.168.1.64/stream1
    rotation: 0
    fps_process: 2
    min_face_w: 0
    max_pitch: 80
  cam_63:
    rtsp: rtsp://user:password@192.168.1.63/stream2
    rtsp_hd: rtsp://user:password@192.168.1.63/stream1
    rotation: 0
    fps_process: 2
    min_face_w: 0
    max_pitch: 80
    # Per-camera threshold overrides — useful when a camera's angle or
    # lighting makes faces look different from the global defaults.
    # Omit to use the global recognition values below.
    similarity_threshold: 0.45  # lower = more permissive (good for steep angles)
    unknown_threshold: 0.33

recognition:
  det_score_min: 0.3
  similarity_threshold: 0.50
  unknown_threshold: 0.38
  cooldown_sec: 30
  det_size: 320

mqtt:
  host: 192.168.1.20
  port: 1883
  user: mqtt
  password: mqtt
  topic: facerecog2/result

face_db:
  path: /opt/facerecog2/data/faces
  cache: /opt/facerecog2/data/embeddings.pkl

snapshots:
  path: /opt/facerecog2/data/snapshots
  keep_hours: 24

api:
  host: 0.0.0.0
  port: 8080
